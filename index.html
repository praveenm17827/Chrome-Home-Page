<!DOCTYPE html>
<html lang="en" class="h-full select-none">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Homepage</title>

  <!-- SEO & Accessibility Meta Tags -->
  <meta name="description"
    content="A premium, non-scrolling glassmorphic start page inspired by Apple VisionOS, Windows Fluent Design, and Momentum.">
  <meta name="keywords"
    content="start page, browser homepage, visionos, fluent design, glassmorphism, chrome start page">
  <meta name="author" content="Dashboard Creator">

  <!-- Fonts: Outfit (Clock/Greeting) & Inter (UI Details) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            outfit: ['Outfit', 'sans-serif'],
          },
          animation: {
            'fade-in': 'fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(6px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            slideUp: {
              '0%': { opacity: '0', transform: 'translateY(16px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
          }
        }
      }
    }
  </script>

  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Custom Styles Sheet -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body
  class="h-screen w-screen overflow-hidden flex flex-col justify-between p-4 sm:p-6 text-slate-100 font-sans relative antialiased bg-black">

  <!-- Cinematic Background Slideshow -->
  <div id="slideshow-container" class="absolute inset-0 w-full h-full overflow-hidden z-0 pointer-events-none">
    <div id="bg-slide-1"
      class="absolute inset-0 w-full h-full bg-cover bg-center transition-opacity duration-[2000ms] opacity-100 scale-100">
    </div>
    <div id="bg-slide-2"
      class="absolute inset-0 w-full h-full bg-cover bg-center transition-opacity duration-[2000ms] opacity-0 scale-100">
    </div>
    <!-- Dark Vignette Overlay for Readability -->
    <div class="absolute inset-0 bg-gradient-to-b from-black/40 via-black/25 to-black/55 z-10" id="readability-overlay">
    </div>
  </div>

  <!-- Left/Right Cinematic Floating Controls for Slideshow -->
  <button id="prev-bg-btn"
    class="absolute left-4 top-1/2 -translate-y-1/2 z-30 w-11 h-11 rounded-full glass-panel flex items-center justify-center hover-glow opacity-0 hover:opacity-100 focus:opacity-100 transition-all duration-300 group"
    aria-label="Previous background slide">
    <i data-lucide="chevron-left"
      class="w-5 h-5 text-white/70 group-hover:text-white group-hover:scale-110 transition-all"></i>
  </button>
  <button id="next-bg-btn"
    class="absolute right-4 top-1/2 -translate-y-1/2 z-30 w-11 h-11 rounded-full glass-panel flex items-center justify-center hover-glow opacity-0 hover:opacity-100 focus:opacity-100 transition-all duration-300 group"
    aria-label="Next background slide">
    <i data-lucide="chevron-right"
      class="w-5 h-5 text-white/70 group-hover:text-white group-hover:scale-110 transition-all"></i>
  </button>

  <!-- Top-Right Google Navigation Bar -->
  <header class="fixed top-4 right-4 z-40 flex items-center space-x-3 animate-fade-in opacity-0"
    style="animation-delay: 50ms;">
    <!-- Gmail Shortcut (maximized size using standard classes) -->
    <a href="https://mail.google.com" target="_blank" rel="noopener noreferrer"
      class="glass-panel hover-glow flex items-center space-x-2 px-4 py-2 text-sm text-white/90 hover:text-white font-medium transition-all group rounded-xl"
      aria-label="Open Gmail in a new tab">
      <img src="https://www.google.com/s2/favicons?domain=mail.google.com&sz=64" alt="" class="w-5 h-5 object-contain">
      <span class="font-outfit tracking-wide">Gmail</span>
    </a>
    <!-- 9-Dot Launcher Button (maximized size using standard classes) -->
    <button id="apps-launcher-btn"
      class="glass-panel hover-glow w-10 h-10 flex items-center justify-center rounded-xl hover:scale-105 transition-all group"
      aria-label="Open Google Apps Menu">
      <div class="grid grid-cols-3 gap-1 w-5 h-5 justify-center items-center">
        <div class="w-1 h-1 bg-white/80 group-hover:bg-white rounded-full transition-colors"></div>
        <div class="w-1 h-1 bg-white/80 group-hover:bg-white rounded-full transition-colors"></div>
        <div class="w-1 h-1 bg-white/80 group-hover:bg-white rounded-full transition-colors"></div>
        <div class="w-1 h-1 bg-white/80 group-hover:bg-white rounded-full transition-colors"></div>
        <div class="w-1 h-1 bg-white/80 group-hover:bg-white rounded-full transition-colors"></div>
        <div class="w-1 h-1 bg-white/80 group-hover:bg-white rounded-full transition-colors"></div>
        <div class="w-1 h-1 bg-white/80 group-hover:bg-white rounded-full transition-colors"></div>
        <div class="w-1 h-1 bg-white/80 group-hover:bg-white rounded-full transition-colors"></div>
        <div class="w-1 h-1 bg-white/80 group-hover:bg-white rounded-full transition-colors"></div>
      </div>
    </button>
  </header>

  <!-- Main Startpage Layout -->
  <main
    class="w-full flex-1 flex flex-col items-center justify-center z-20 max-w-4xl mx-auto py-2 sm:py-4 gap-4 sm:gap-5 select-none relative">

    <!-- Hero Zone (Top-Center, slightly raised) -->
    <section id="hero-zone" class="w-full flex flex-col items-center justify-center animate-fade-in opacity-0"
      style="animation-delay: 100ms;">
      <!-- Hero Card (frosted glass card - more compact padding and max-widths) -->
      <div id="hero-card"
        class="glass-panel w-full max-w-md sm:max-w-lg md:max-w-xl flex flex-col items-center text-center relative px-3 py-1 sm:py-2 md:py-3 hover-glow">

        <!-- Profile Image (Positioned at the top, slightly overlapping/prominent) -->
        <div class="relative group cursor-pointer mb-5 sm:mb-5.5">
          <div
            class="absolute inset-0 bg-gradient-to-tr from-sky-400 to-indigo-500 rounded-full blur-md opacity-25 group-hover:opacity-45 transition-opacity duration-300">
          </div>
          <img id="profile-img" src="" alt="Profile Avatar"
            class="relative rounded-full border-2 border-white/25 object-cover hover:scale-[1.03] transition-transform duration-300 shadow-xl">
        </div>

        <!-- Clock Widget -->
        <div id="clock-container" class="cursor-pointer select-none mb-2.5 sm:mb-3 group/clock"
          title="Click to toggle 12/24-hour format">
          <div id="live-time"
            class="text-4xl sm:text-4xl md:text-4xl font-extrabold font-outfit tracking-tight leading-none text-cyan- tabular-nums drop-shadow-md group-hover/clock:scale-[1.01] transition-transform duration-300">
            00:00:00
          </div>
          <div id="live-date"
            class="text-[10px] sm:text-xs font-bold tracking-widest uppercase mt-2 text-white drop-shadow-sm">
            Thursday, January 1
          </div>
        </div>

        <!-- Greeting & Tagline -->
        <div class="flex flex-col items-center">
          <h1 id="greeting-text"
            class="text-xl sm:text-2xl font-bold font-outfit text-white tracking-tight drop-shadow-sm">
            Hello, MR STARK
          </h1>
          <p id="tagline-text"
            class="text-xs sm:text-sm text-white/70 font-light mt-1 italic max-w-sm truncate drop-shadow-sm">
            Build. Learn. Create.
          </p>
        </div>
      </div>
    </section>

    <!-- Search Zone (Directly below hero card) -->
    <section id="search-zone" class="w-full max-w-xl sm:max-w-2xl animate-fade-in opacity-0"
      style="animation-delay: 200ms;">
      <form id="search-form" action="https://www.google.com/search" method="GET"
        class="relative w-full flex items-center group">
        <div
          class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-white/45 group-focus-within:text-white/80 transition-colors">
          <i data-lucide="search" class="w-5 h-5"></i>
        </div>
        <input type="text" name="q" id="search-input" placeholder="Search Google..." autocomplete="off" autofocus
          class="w-full py-3.5 sm:py-4 pl-12 pr-12 text-sm sm:text-base text-white placeholder-white/45 glass-panel bg-white/5 border-white/10 focus:bg-white/10 focus:border-white/25 focus:shadow-[0_15px_30px_rgba(0,0,0,0.25)] focus:outline-none transition-all duration-300 rounded-2xl"
          aria-label="Search Google">
        <button type="button" id="clear-search-btn"
          class="absolute inset-y-0 right-4 flex items-center text-white/40 hover:text-white opacity-0 group-focus-within:opacity-100 transition-opacity focus-visible"
          aria-label="Clear Search Input">
          <i data-lucide="x" class="w-4.5 h-4.5"></i>
        </button>
      </form>
    </section>

    <!-- Shortcuts Zone (Bottom-Center area) -->
    <section id="shortcuts-zone" class="w-full max-w-2xl sm:max-w-3xl animate-fade-in opacity-0 flex flex-col"
      style="animation-delay: 300ms;">
      <div class="flex items-center justify-between px-3 mb-2.5">
        <span class="text-[10px] sm:text-[11px] font-bold tracking-widest uppercase text-white/60 drop-shadow-sm">Quick
          Links</span>
        <button id="add-shortcut-btn"
          class="text-[10px] sm:text-[11px] font-bold px-3 py-1 rounded-lg bg-white/8 hover:bg-white/15 border border-white/10 transition-all flex items-center space-x-1.5 text-white/90 hover:text-white hover-glow focus-visible"
          aria-label="Add a shortcut">
          <i data-lucide="plus" class="w-3.5 h-3.5"></i>
          <span>Add Link</span>
        </button>
      </div>

      <!-- Shortcut Grid (Lined up in the same row) -->
      <div id="shortcuts-grid"
        class="flex flex-row justify-center items-center gap-2 sm:gap-2.5 w-full overflow-x-auto py-1 custom-scroll">
        <!-- Dynamic shortcuts injected here -->
      </div>
    </section>

  </main>

  <!-- ==========================================
     MODALS & DIALOGS (Glassmorphic & Rounded)
     ========================================== -->

  <!-- SHORTCUT MODAL (Add / Edit / Delete) -->
  <div id="shortcut-modal"
    class="fixed inset-0 z-50 flex items-center justify-center opacity-0 pointer-events-none transition-all duration-300">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" id="modal-overlay"></div>
    <div
      class="relative glass-panel w-full max-w-sm p-6 border border-white/20 m-4 z-10 shadow-2xl animate-slide-up text-left">

      <!-- Modal Header -->
      <div class="flex justify-between items-center mb-5 border-b border-white/10 pb-3">
        <h3 id="modal-title" class="text-base font-bold tracking-tight font-outfit text-white">Add Shortcut</h3>
        <button id="close-modal-btn"
          class="p-1 rounded-md hover:bg-white/10 text-white/70 hover:text-white focus-visible"
          aria-label="Close modal">
          <i data-lucide="x" class="w-4.5 h-4.5"></i>
        </button>
      </div>

      <!-- Modal Form -->
      <form id="shortcut-form" class="space-y-4">
        <input type="hidden" id="edit-shortcut-index" value="-1">

        <div>
          <label for="shortcut-title-input"
            class="block text-[10px] font-bold text-white/60 uppercase tracking-widest mb-1.5">Shortcut Name *</label>
          <input type="text" id="shortcut-title-input" placeholder="e.g. GitHub" required
            class="w-full glass-input text-xs py-2.5 px-3 focus:outline-none rounded-xl">
        </div>

        <div>
          <label for="shortcut-url-input"
            class="block text-[10px] font-bold text-white/60 uppercase tracking-widest mb-1.5">URL *</label>
          <input type="url" id="shortcut-url-input" placeholder="https://github.com" required
            class="w-full glass-input text-xs py-2.5 px-3 focus:outline-none rounded-xl">
        </div>

        <div>
          <label for="shortcut-icon-input"
            class="block text-[10px] font-bold text-white/60 uppercase tracking-widest mb-1.5">Custom Icon URL
            (Optional)</label>
          <input type="url" id="shortcut-icon-input" placeholder="https://example.com/icon.png"
            class="w-full glass-input text-xs py-2.5 px-3 focus:outline-none rounded-xl">
          <p class="text-[9px] text-white/40 mt-1">Leave blank to load the favicon automatically using Google Favicon
            service.</p>
        </div>

        <!-- Form Actions -->
        <div class="flex justify-between items-center pt-3 border-t border-white/10 mt-5">
          <button type="button" id="delete-shortcut-modal-btn"
            class="hidden px-3.5 py-2 rounded-xl bg-red-500/15 hover:bg-red-500/25 border border-red-500/30 text-red-400 text-[10px] font-bold tracking-wider transition-all uppercase focus-visible">
            Delete
          </button>
          <div class="flex space-x-2 ml-auto">
            <button type="button" id="cancel-shortcut-btn"
              class="px-3.5 py-2 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 text-white text-[10px] font-bold tracking-wider transition-all uppercase focus-visible">
              Cancel
            </button>
            <button type="submit"
              class="px-4 py-2 rounded-xl bg-white text-black hover:bg-white/95 text-[10px] font-bold tracking-wider transition-all uppercase shadow-lg shadow-white/5 focus-visible">
              Save
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- GOOGLE APPS LAUNCHER MODAL (9-Dot Apps Launcher - positioned on the right side) -->
  <div id="apps-launcher-modal"
    class="fixed inset-0 z-50 flex justify-end items-start pt-16 pr-4 sm:pr-6 opacity-0 pointer-events-none transition-all duration-300">
    <div class="absolute inset-0 bg-black/30 backdrop-blur-[2px]" id="apps-modal-overlay"></div>
    <div
      class="relative glass-panel w-full max-w-sm sm:max-w-md h-[80vh] flex flex-col p-5 border border-white/20 z-10 shadow-2xl animate-slide-up text-left overflow-hidden">

      <!-- Modal Header -->
      <div class="flex justify-between items-center mb-4 border-b border-white/10 pb-3">
        <h3 class="text-base font-bold tracking-tight font-outfit text-white">Google App Launcher</h3>
        <button id="close-apps-btn"
          class="p-1 rounded-md hover:bg-white/10 text-white/70 hover:text-white focus-visible"
          aria-label="Close Google Apps launcher">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>

      <!-- Real-time Apps Search -->
      <div class="relative w-full mb-4">
        <div class="absolute inset-y-0 left-3.5 flex items-center pointer-events-none text-white/40">
          <i data-lucide="search" class="w-4 h-4"></i>
        </div>
        <input type="text" id="apps-search-input" placeholder="Search Google Apps..." autocomplete="off"
          class="w-full py-2.5 pl-10 pr-9 text-xs sm:text-sm text-white placeholder-white/40 glass-panel bg-white/5 border-white/10 focus:bg-white/10 focus:border-white/25 focus:outline-none transition-all duration-200 rounded-xl">
        <button type="button" id="clear-apps-search-btn"
          class="absolute inset-y-0 right-3.5 flex items-center text-white/40 hover:text-white opacity-0 transition-opacity focus-visible"
          aria-label="Clear app search">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>

      <!-- Scrollable App Categories & Grids -->
      <div class="flex-1 overflow-y-auto pr-1 space-y-5 custom-scroll" id="apps-scroll-container">

        <!-- Pinned Favorites Grid (3-column layout) -->
        <div id="apps-favorites-section" class="space-y-3">
          <div class="flex items-center justify-between border-b border-white/10 pb-1">
            <span class="text-[10px] font-bold tracking-widest uppercase text-white/50">Favorites</span>
          </div>
          <div id="apps-favorites-grid" class="grid grid-cols-3 gap-2.5">
            <!-- Pinned cards will render here -->
          </div>
        </div>

        <!-- All Applications Grid (3-column layout) -->
        <div id="apps-all-section" class="space-y-3">
          <div class="flex items-center justify-between border-b border-white/10 pb-1">
            <span class="text-[10px] font-bold tracking-widest uppercase text-white/50">All Applications</span>
            <button id="restore-hidden-apps-btn"
              class="text-[9px] font-bold text-white/40 hover:text-white/80 transition-all uppercase tracking-wider hidden"
              aria-label="Restore all hidden apps">
              Restore Hidden
            </button>
          </div>
          <div id="apps-all-grid" class="grid grid-cols-3 gap-2.5">
            <!-- Normal cards will render here -->
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- JavaScript Scripts -->
  <script src="js/data.js"></script>
  <script src="js/script.js"></script>
</body>

</html>
